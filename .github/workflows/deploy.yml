name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      # ── Always also publish to GitHub Pages as a free backup mirror ────────
      # (Costs nothing and gives you a fallback URL while DNS / Hostinger sorts itself out.)
      - name: Deploy to GitHub Pages (backup mirror)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: ams.thestudioinfinito.com

      # ── Detect whether Hostinger FTP secrets are configured ────────────────
      # GitHub Actions can't reference secrets directly in `if:` conditions,
      # so this step copies them into a step output we CAN reference below.
      - name: Check Hostinger FTP secrets
        id: ftp_check
        run: |
          if [ -n "${{ secrets.HOSTINGER_FTP_SERVER }}" ] && [ -n "${{ secrets.HOSTINGER_FTP_USERNAME }}" ] && [ -n "${{ secrets.HOSTINGER_FTP_PASSWORD }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✅ Hostinger FTP secrets present — will deploy to public_html/"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Hostinger FTP secrets not configured — skipping FTP deploy."
            echo "   Add HOSTINGER_FTP_SERVER / _USERNAME / _PASSWORD in repo settings to enable."
          fi

      # ── Deploy to Hostinger via FTP ────────────────────────────────────────
      # ACTIVATES AUTOMATICALLY once you add the 3 secrets below in
      #   Repo → Settings → Secrets and variables → Actions → New repository secret
      #     HOSTINGER_FTP_SERVER     e.g. ftp.thestudioinfinito.com
      #     HOSTINGER_FTP_USERNAME   from Hostinger → Files → FTP Accounts
      #     HOSTINGER_FTP_PASSWORD   from Hostinger → Files → FTP Accounts
      - name: Deploy to Hostinger FTP
        if: steps.ftp_check.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./dist/
          # Most Hostinger shared plans use /public_html/ as the web root.
          # If your domain is on a subfolder (e.g. addon domain), change this
          # to /domains/yourdomain.com/public_html/ instead.
          server-dir: /public_html/
          # Don't wipe everything — Hostinger may have other files (logo, .htaccess) you want kept.
          dangerous-clean-slate: false
          # Skip files that haven't changed → much faster uploads after the first run.
          state-name: .ftp-deploy-sync-state.json
