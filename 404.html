<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AMS — Asset Management System | Gem Aromatics</title>
  <script>
    // SPA redirect: preserve the full path+search+hash when GitHub Pages 404s on a deep link
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?r=' + encodeURIComponent(l.pathname + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
